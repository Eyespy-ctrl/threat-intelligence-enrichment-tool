<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TI Tool — Submit</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-4">
    <h1 class="mb-4">BObbY-WaN</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for cat, msg in messages %}
          <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
            {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card p-4 mb-3">
      <form action="{{ url_for('submit') }}" method="post" novalidate>
        <div class="mb-3">
          <label for="observable" class="form-label">Observable (IP ,URL or domain)</label>
          <input id="observable" name="observable" class="form-control" placeholder="e.g. 8.8.8.8 or example.com" required>
        </div>
        <button type="submit" class="btn btn-primary">Enrich</button>
      </form>
    </div>

    <p>
      <a href="{{ url_for('all_entries') }}" class="btn btn-link">View all results</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
